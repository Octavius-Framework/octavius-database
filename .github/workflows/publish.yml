name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and Publish Locally
        env:
          OSSRH_GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          OSSRH_GPG_SECRET_KEY_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
        run: ./gradlew publishAllPublicationsToLocalStagingRepository

      - name: Zip Artifacts
        run: |
          cd build/staging-deploy
          zip -r ../../publish-bundle.zip .

      - name: Upload to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          curl -X POST https://central.sonatype.com/api/v1/publisher/upload?publishingType=USER_MANAGED \
            -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            -H "Accept: application/json" \
            -F "bundle=@publish-bundle.zip"